<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신규 고객 진행 상황 · KG Hok</title>

<!-- ============================================================
     Firebase SDK (compat) — 팀 실시간 공유에 사용됩니다.
     아래 firebaseConfig 만 채우면 '팀 공유 모드'로 전환됩니다.
     비워두면 이 브라우저에만 저장되는 '로컬 모드'로 동작합니다.
     ============================================================ -->
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#F6F7F9; --surface:#FFFFFF; --ink:#1A2230; --muted:#707A89;
  --line:#E5E9EF; --line-strong:#D4DAE3;
  --accent:#2F4BC4; --accent-soft:#ECEFFB; --accent-ink:#26399B;
  --danger:#C0291F; --danger-soft:#FBE3E1;
  --ok:#15803D; --ok-soft:#DCF3E3;
  --radius:10px;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}

.app-header{
  background:var(--surface); border-bottom:1px solid var(--line);
  padding:18px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  position:sticky; top:0; z-index:50;
}
.brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
.brand h1{font-size:19px; font-weight:700; letter-spacing:-.01em; margin:0}
.brand .count{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
.mode-badge{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:5px 11px; border-radius:999px; white-space:nowrap;}
.mode-badge .dot{width:7px;height:7px;border-radius:50%}
.mode-shared{background:var(--ok-soft); color:var(--ok)} .mode-shared .dot{background:var(--ok)}
.mode-local{background:#FEF3DD; color:#B45309} .mode-local .dot{background:#D98A1A}

.btn{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); padding:9px 15px; border-radius:8px; cursor:pointer; font-weight:600; transition:background .12s,border-color .12s;}
.btn:hover{background:#F2F4F8}
.btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#fff}
.btn-primary:hover{background:#2640AD}

.summary{display:flex; gap:8px; flex-wrap:wrap; padding:14px 24px 0;}
.summary-pill{display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border:1px solid var(--line); border-radius:999px; background:var(--surface); cursor:pointer; font-size:12.5px; font-weight:600; color:var(--muted); transition:border-color .12s, background .12s;}
.summary-pill:hover{background:#F1F3F7}
.summary-pill[aria-pressed="true"]{border-color:var(--accent); color:var(--accent-ink); background:var(--accent-soft)}
.summary-pill .n{font-variant-numeric:tabular-nums; color:var(--ink)}
.summary-link{display:inline-flex; align-items:center; gap:5px; padding:6px 13px; border:1px solid var(--accent); border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); font-size:12.5px; font-weight:700; text-decoration:none; white-space:nowrap;}
.summary-link:hover{background:#E1E7FB}

.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:14px 24px 6px;}
.search{flex:1 1 260px; min-width:200px; position:relative;}
.search input{width:100%; padding:9px 12px 9px 34px; border:1px solid var(--line-strong); border-radius:8px; background:var(--surface);}
.search input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted)}
.link-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-weight:600;padding:8px}
.link-clear:hover{color:var(--ink)}

.table-scroll{margin:8px 24px 80px; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); overflow:auto; max-height:calc(100dvh - 210px);}
table{border-collapse:separate; border-spacing:0; width:max-content; min-width:100%}
thead th{position:sticky; top:0; z-index:20; background:#FBFCFD; text-align:center; font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.01em; white-space:nowrap; padding:11px 13px; border-bottom:1px solid var(--line-strong);}
thead th.sortable{cursor:pointer; user-select:none}
thead th.sortable:hover{color:var(--ink)}
thead th .arrow{opacity:.4; font-size:10px; margin-left:3px}
thead th.sorted .arrow{opacity:1; color:var(--accent)}
tbody td{padding:8px 13px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap; font-variant-numeric:tabular-nums; text-align:center;}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#F8FAFC}
td.idx{color:var(--muted); font-weight:600; text-align:center; width:48px}
td.wrap{white-space:normal; max-width:220px; min-width:130px}
td.date-cell{color:var(--ink)}
td.date-cell.empty-date{color:#C2C8D0}
.mono{font-family:var(--mono); font-size:13px}
td.dup-biz{color:var(--danger); font-weight:700}
.block-check{width:16px; height:16px; cursor:pointer; accent-color:var(--danger)}
tbody tr.blocked td{color:#A7AEB7}
tbody tr.blocked td:not(.fz-bul):not(.fz-memo):not(:last-child){text-decoration:line-through}
tbody tr.blocked td.dup-biz{color:#A7AEB7}
td.editable{cursor:cell}
td.memo-col{max-width:220px}
.memo-ellipsis{max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

/* 좌측 고정(프리즈) 칼럼: # / 사업자등록번호 / 상호명 / 메모아이콘 */
th.fz, td.fz{position:sticky; background:var(--surface)}
td.fz{z-index:10}
thead th.fz{z-index:30; background:#FBFCFD}
tbody tr:hover td.fz{background:#F8FAFC}
td.fz-idx, th.fz-idx{left:0}
td.fz-biz, th.fz-biz{left:48px; width:118px; min-width:118px; max-width:118px}
td.fz-name, th.fz-name{left:166px; width:150px; min-width:150px; max-width:150px}
td.fz-bul, th.fz-bul{left:316px; width:52px; min-width:52px; max-width:52px; text-align:center}
td.fz-memo, th.fz-memo{left:368px; width:46px; min-width:46px; max-width:46px; box-shadow:1px 0 0 var(--line-strong); text-align:center}
@media (max-width:700px){ td.fz, th.fz{position:static} td.fz-memo, th.fz-memo{box-shadow:none} }

.memo-icon-btn{border:1px solid var(--line); background:var(--surface); border-radius:7px; width:30px; height:30px; cursor:pointer; color:var(--muted); display:inline-flex; align-items:center; justify-content:center; transition:.12s; padding:0}
.memo-icon-btn:hover{color:var(--ink); border-color:var(--line-strong); background:#F2F4F8}
.memo-icon-btn.has-memo{color:var(--accent-ink); border-color:#C9D3F6; background:var(--accent-soft)}
td.editable:hover{background:#EEF2FB!important; box-shadow:inset 0 0 0 1px var(--accent-soft)}
td input.inline-edit, td textarea.inline-edit{width:100%; min-width:96px; padding:4px 7px; border:1px solid var(--accent); border-radius:6px; font:inherit; background:#fff;}
td input.inline-edit:focus, td textarea.inline-edit:focus{outline:none; box-shadow:0 0 0 3px var(--accent-soft)}
td textarea.inline-edit{min-width:200px; min-height:64px; resize:vertical; line-height:1.5; white-space:pre-wrap}

.yn-btn{border:1px solid transparent; border-radius:6px; padding:3px 12px; font-size:12px; font-weight:700; cursor:pointer; min-width:42px;}
.yn-btn.y{background:var(--ok-soft); color:var(--ok)}
.yn-btn.n{background:#F0F2F5; color:#A4ACB7}
.yn-btn:focus-visible{outline:2px solid var(--accent); outline-offset:1px}

.row-actions{display:flex; gap:4px; justify-content:center}
.icon-btn{border:1px solid var(--line); background:var(--surface); border-radius:7px; width:30px; height:30px; cursor:pointer; color:var(--muted); display:inline-flex; align-items:center; justify-content:center; transition:.12s;}
.icon-btn:hover{color:var(--ink); border-color:var(--line-strong); background:#F2F4F8}
.icon-btn.del:hover{color:var(--danger); border-color:var(--danger); background:var(--danger-soft)}

.empty{padding:60px 24px; text-align:center; color:var(--muted)}
.empty strong{display:block; color:var(--ink); font-size:15px; margin-bottom:6px}

.scrim{position:fixed; inset:0; background:rgba(20,28,42,.42); opacity:0; pointer-events:none; transition:opacity .2s; z-index:90}
.scrim.open{opacity:1; pointer-events:auto}
.drawer{position:fixed; top:0; right:0; height:100%; width:420px; max-width:92vw; background:var(--surface); box-shadow:-12px 0 40px rgba(20,28,42,.18); transform:translateX(100%); transition:transform .24s cubic-bezier(.32,.72,.32,1); z-index:91; display:flex; flex-direction:column;}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:20px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between}
.drawer-head h2{margin:0; font-size:17px; font-weight:700}
.drawer-body{padding:18px 22px; overflow-y:auto; flex:1}
.drawer-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; gap:10px}
.drawer-foot .btn{flex:1; text-align:center; padding:11px}
.field{margin-bottom:14px}
.field label{display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:6px}
.field input, .field select, .field textarea{width:100%; padding:9px 11px; border:1px solid var(--line-strong); border-radius:8px; background:var(--surface); font:inherit;}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.field textarea{resize:vertical; min-height:72px; line-height:1.5}
.seg{display:flex; gap:0; border:1px solid var(--line-strong); border-radius:8px; overflow:hidden}
.seg button{flex:1; padding:9px; background:var(--surface); border:none; cursor:pointer; font-weight:700; color:var(--muted)}
.seg button.active{background:var(--accent); color:#fff}
.seg button:first-child.active{background:#8A929E}

.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 18px; border-radius:9px; font-weight:600; opacity:0; pointer-events:none; transition:.22s; z-index:120; box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

.memo-tip{position:fixed; z-index:130; max-width:320px; background:var(--ink); color:#fff; padding:9px 12px; border-radius:8px; font-size:12.5px; line-height:1.5; box-shadow:0 8px 24px rgba(0,0,0,.22); pointer-events:none; opacity:0; transition:opacity .12s; white-space:pre-wrap; word-break:break-word;}
.memo-tip.show{opacity:1}
.memo-tip::before{content:"메모"; display:block; font-size:10.5px; font-weight:700; letter-spacing:.04em; color:#9AA6FF; margin-bottom:3px;}

#memoScrim{z-index:95}
.memo-modal{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.96); width:440px; max-width:92vw; background:var(--surface); border-radius:14px; box-shadow:0 20px 60px rgba(20,28,42,.28); z-index:96; opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; display:flex; flex-direction:column; padding:18px 20px;}
.memo-modal.open{opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1)}
.memo-modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
.memo-modal-head strong{font-size:15px; font-weight:700}
.memo-modal textarea{width:100%; min-height:170px; padding:11px 12px; border:1px solid var(--line-strong); border-radius:9px; font:inherit; line-height:1.6; resize:vertical;}
.memo-modal textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.memo-modal-foot{display:flex; gap:10px; margin-top:14px}
.memo-modal-foot .btn{flex:1; padding:10px}

.setup-hint{margin:14px 24px 0; padding:12px 16px; background:#FEF8EC; border:1px solid #F4DFB0; border-radius:9px; font-size:13px; color:#8A5A12; line-height:1.6;}
.setup-hint code{background:#fff; border:1px solid #EED9A8; padding:1px 6px; border-radius:5px; font-family:var(--mono); font-size:12px}

.auth-screen{position:fixed; inset:0; z-index:200; background:var(--bg); display:none; align-items:center; justify-content:center; padding:20px;}
.auth-card{width:100%; max-width:380px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:32px 28px; box-shadow:0 10px 40px rgba(20,28,42,.08); text-align:center;}
.auth-card h1{font-size:19px; font-weight:700; margin:0 0 6px}
.auth-sub{margin:0 0 22px; color:var(--muted); font-size:13px; line-height:1.6}
.google-btn{width:100%; display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:11px}
.auth-error{color:var(--danger); font-size:12.5px; font-weight:600; margin-top:14px; min-height:16px; line-height:1.5}
.role-badge{display:inline-flex; align-items:center; font-size:12px; font-weight:700; padding:5px 11px; border-radius:999px; white-space:nowrap; background:var(--accent-soft); color:var(--accent-ink)}
.role-badge.viewer{background:#FEF3DD; color:#B45309}
.acl-row{display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--line)}
.acl-row .em{flex:1; font-size:13px; word-break:break-all}
.acl-row select{padding:6px 8px; border:1px solid var(--line-strong); border-radius:7px}
.acl-row .rm{border:1px solid var(--line); background:var(--surface); border-radius:7px; width:30px; height:30px; cursor:pointer; color:var(--muted)}
.acl-row .rm:hover{color:var(--danger); border-color:var(--danger); background:var(--danger-soft)}

@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media (max-width:560px){
  .app-header{padding:14px 16px}
  .summary,.toolbar{padding-left:16px;padding-right:16px}
  .table-scroll{margin-left:16px;margin-right:16px; max-height:calc(100dvh - 250px)}
}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <h1>신규 고객 진행 상황</h1>
    <p class="auth-sub" id="authSub">팀 전용 페이지입니다. 구글 계정으로 로그인하세요.</p>
    <button class="btn google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google로 로그인
    </button>
    <div class="auth-error" id="authError"></div>
    <button class="btn" id="authLogout" style="display:none">다른 계정으로 로그인</button>
  </div>
</div>

<div class="scrim" id="adminScrim"></div>
<aside class="drawer" id="adminDrawer" aria-hidden="true">
  <div class="drawer-head"><h2>권한 관리</h2><button class="icon-btn" id="adminClose" aria-label="닫기">✕</button></div>
  <div class="drawer-body">
    <p style="font-size:12.5px;color:var(--muted);margin:0 0 16px;line-height:1.6">팀원의 구글 이메일을 등록하고 권한을 정하세요. <strong>편집</strong>은 보기+수정, <strong>보기</strong>는 읽기 전용입니다. 목록에 없는 계정은 접근할 수 없습니다.</p>
    <div class="field"><label>구글 이메일</label><input type="email" id="aclEmail" placeholder="member@gmail.com"></div>
    <div class="field"><label>권한</label>
      <select id="aclRole"><option value="editor">편집 (보기+수정)</option><option value="viewer">보기 (읽기 전용)</option></select>
    </div>
    <button class="btn btn-primary" id="aclAdd" style="width:100%;padding:11px">추가 / 변경</button>
    <div id="aclList" style="margin-top:20px"></div>
  </div>
</aside>


<header class="app-header">
  <div class="brand"><h1>신규 고객 진행 상황</h1><span class="count" id="count">0건</span></div>
  <span class="mode-badge" id="modeBadge"><span class="dot"></span><span id="modeText">연결 중…</span></span>
  <span class="role-badge" id="roleBadge" style="display:none"></span>
  <button class="btn" id="importBtn">엑셀 가져오기</button>
  <button class="btn" id="csvBtn">CSV 내보내기</button>
  <button class="btn btn-primary" id="addBtn">+ 신규 고객</button>
  <button class="btn" id="adminBtn" style="display:none">권한 관리</button>
  <button class="btn" id="logoutBtn" style="display:none">로그아웃</button>
  <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none">
</header>

<div class="setup-hint" id="setupHint" style="display:none">
  현재 <strong>로컬 모드</strong>입니다 — 이 브라우저에만 저장되어 팀원과 공유되지 않습니다.
  팀 공유를 켜려면 이 파일 상단 <code>firebaseConfig</code> 값을 기존 todo 앱의 설정과 동일하게 채워주세요.
</div>

<div class="summary" id="summary"></div>

<div class="toolbar">
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <input id="search" type="search" placeholder="상호명, 사업자번호, 신용 결과 검색">
  </div>
  <button class="link-clear" id="clearBtn">필터 초기화</button>
</div>

<div class="table-scroll">
  <table><thead><tr id="theadRow"></tr></thead><tbody id="tbody"></tbody></table>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head"><h2 id="drawerTitle">신규 고객</h2><button class="icon-btn" id="closeDrawer" aria-label="닫기">✕</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot"><button class="btn" id="cancelBtn">취소</button><button class="btn btn-primary" id="saveBtn">저장</button></div>
</aside>

<div class="memo-tip" id="memoTip"></div>

<div class="scrim" id="memoScrim"></div>
<div class="memo-modal" id="memoModal">
  <div class="memo-modal-head"><strong id="memoModalTitle">메모</strong><button class="icon-btn" id="memoModalClose" aria-label="닫기">✕</button></div>
  <textarea id="memoModalText" placeholder="메모 입력 (Enter 저장 · Shift+Enter 줄바꿈)"></textarea>
  <div class="memo-modal-foot"><button class="btn" id="memoModalCancel">취소</button><button class="btn btn-primary" id="memoModalSave">저장</button></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   1. 설정: 기존 todo 앱의 firebaseConfig 값을 그대로 붙여넣으면 팀 공유 모드가 됩니다.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDxeLZ_V0WF46pQsUjnX3cXHGcpcSoxgK8",
  authDomain: "kg-hok.firebaseapp.com",
  projectId: "kg-hok",
  storageBucket: "kg-hok.firebasestorage.app",
  messagingSenderId: "1087565591407",

/* ============================================================
   3. 저장소 계층 (Firebase 있으면 실시간 공유, 없으면 localStorage)
   ============================================================ */
let MODE="local", db=null;
const Store={
  init(){
    const ok=firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PASTE_");
    if(ok && window.firebase){
      try{ firebase.initializeApp(firebaseConfig); db=firebase.firestore(); MODE="shared"; }
      catch(e){ console.warn("Firebase 초기화 실패, 로컬 모드:",e); MODE="local"; }
    }
  },
  subscribe(cb){
    this._cb=cb;
    if(MODE==="shared"){
      db.collection(COLLECTION).onSnapshot(s=>{ const r=[]; s.forEach(d=>r.push({id:d.id,...d.data()})); cb(r); },
        e=>{ console.error(e); showToast("동기화 오류 — 콘솔 확인"); });
    }else cb(this._read());
  },
  _emit(){ if(this._cb) this._cb(this._read()); },   // 로컬 변경을 화면에 즉시 반영
  async upsert(rec){
    if(MODE==="shared"){
      const id=rec.id, data={...rec}; delete data.id;
      if(id) await db.collection(COLLECTION).doc(id).set(data);
      else   await db.collection(COLLECTION).add(data);
    }else{
      const rows=this._read();
      if(rec.id){ const i=rows.findIndex(r=>r.id===rec.id); if(i>=0)rows[i]=rec; else rows.push(rec); }
      else{ rec.id="loc_"+Date.now()+"_"+Math.random().toString(36).slice(2,7); rows.push(rec); }
      this._write(rows); this._emit();
    }
  },
  async remove(id){
    if(MODE==="shared") await db.collection(COLLECTION).doc(id).delete();
    else{ this._write(this._read().filter(r=>r.id!==id)); this._emit(); }
  },
  _read(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){return[];} },
  _write(r){ localStorage.setItem(LS_KEY,JSON.stringify(r)); }
};

function fmtBizNo(v){ return (v||"").replace(/\D/g,"").slice(0,10); }   // 하이픈 없이 숫자만
function fmtDate(v){ return v ? v.slice(2) : ""; }   // 2026-06-15 -> 26-06-15

function applyFilters(){
  let rows=ALL.slice();
  const c=CHIPS.find(x=>x.id===chip); if(c) rows=rows.filter(c.test);
  if(searchTerm){ const t=searchTerm.toLowerCase();
    rows=rows.filter(r=>["companyName","bizNo","creditResult"].some(k=>String(r[k]||"").toLowerCase().includes(t))); }
  rows.sort((a,b)=>String(a[sortKey]??"").localeCompare(String(b[sortKey]??""),"ko",{numeric:true})*sortDir);

}

function startInlineEdit(td,f,r){
  if(!canEdit) return;
  if(td.querySelector("input,textarea")) return;
  const multiline = !!f.multiline;
  const input = document.createElement(multiline ? "textarea" : "input");
  input.className = "inline-edit" + (multiline ? " inline-edit-area" : "");
  if(!multiline) input.type = f.type==="date" ? "date" : "text";
  input.value = r[f.key]||"";
  if(f.type==="bizno") input.inputMode="numeric";
  td.textContent=""; td.appendChild(input); input.focus();
  if(!multiline && f.type!=="date" && input.value) input.select();
  let done=false;
  const finish=async(save)=>{
    if(done) return; done=true;
    if(save){
      let val=input.value;
      if(f.type==="bizno") val=fmtBizNo(val);
      const rec=ALL.find(x=>x.id===r.id);
      if(rec && val!==(rec[f.key]||"")){ await Store.upsert({...rec,[f.key]:val}); showToast("저장됨"); return; }
    }
    render();
  };
  input.addEventListener("blur",()=>finish(true));
  input.addEventListener("keydown",e=>{
    if(e.key==="Enter" && !(multiline && e.shiftKey)){ e.preventDefault(); input.blur(); }   // Enter=저장, Shift+Enter=줄바꿈
    else if(e.key==="Escape"){ done=true; render(); }
  });
}

   6. CSV (한글 깨짐 방지 UTF-8 BOM, 날짜 yy-mm-dd)
   ============================================================ */
function exportCSV(){
  const rows=applyFilters();
  const head=["#",...FIELDS.map(f=>f.label)];
  const esc=v=>{ const s=String(v??""); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const lines=[head.join(",")];
  rows.forEach((r,i)=>{
    const cells=[i+1,...FIELDS.map(f=>{ const v=r[f.key];
      if(f.type==="yn")return v==="Y"?"Y":"N";
      if(f.type==="check")return v==="Y"?"제외":"";
      if(f.type==="bizno")return (v||"").replace(/\D/g,"");
      if(f.type==="date")return v?fmtDate(v):"";
      return v??""; })];
    lines.push(cells.map(esc).join(","));
  });
  const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`신규고객진행상황_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(a.href);
}

/* 엑셀/CSV 가져오기 */
function _toYMD(d){ const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function _normDate(v){
  if(v instanceof Date && !isNaN(v)) return _toYMD(v);
  let s=String(v).trim(); if(!s) return "";
  s=s.replace(/[.\/]/g,"-").replace(/\s+/g,"");
  const m=s.match(/^(\d{2,4})-(\d{1,2})-(\d{1,2})$/);
  if(m){ let y=m[1]; if(y.length===2)y="20"+y; return `${y}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`; }
  const dt=new Date(s); return isNaN(dt)?"":_toYMD(dt);
}
function _normYN(v){ const s=String(v).trim().toUpperCase(); return (s==="Y"||s==="O"||s==="TRUE"||s==="예"||s==="있음"||s==="1")?"Y":"N"; }

async function importFile(file){
  if(typeof XLSX==="undefined"){ alert("엑셀 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인한 뒤 다시 시도하세요."); return; }
  let rows;
  try{
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:true});
  }catch(e){ console.error(e); alert("파일을 읽지 못했습니다. .xlsx 또는 .csv 파일인지 확인하세요."); return; }
  if(!rows.length){ alert("가져올 데이터가 없습니다."); return; }

  const labelToKey={}; FIELDS.forEach(f=>labelToKey[f.label.trim()]=f);
  const records=[]; const matchedCols=new Set();
  rows.forEach(row=>{
    const rec={};
    Object.keys(row).forEach(h=>{
      const f=labelToKey[String(h).trim()]; if(!f) return;
      let v=row[h]; if(v===""||v==null) return;
      matchedCols.add(f.label);
      if(f.type==="yn"||f.type==="check") rec[f.key]=_normYN(v);
      else if(f.type==="date") rec[f.key]=_normDate(v);
      else if(f.type==="bizno") rec[f.key]=fmtBizNo(String(v));
      else rec[f.key]=String(v);
    });
    if(Object.keys(rec).length) records.push(rec);
  });

  if(matchedCols.size===0){
    alert("엑셀의 칼럼명이 이 페이지의 칼럼명과 일치하지 않습니다.\n첫 행(머리글)을 페이지 칼럼명과 똑같이 맞춰주세요.\n예: 사업자등록번호, 상호명, 신청일 …");
    return;
  }
  if(!records.length){ alert("가져올 유효한 행이 없습니다."); return; }
  if(!confirm(`${records.length}건을 가져옵니다. 기존 목록에 추가됩니다.\n(사업자등록번호가 같으면 새로 추가하지 않고 갱신합니다)\n계속할까요?`)) return;

  const byBiz={}; ALL.forEach(r=>{ if(r.bizNo){ const k=String(r.bizNo).replace(/\D/g,""); if(k) byBiz[k]=r; } });
  let n=0;
  for(const rec of records){
    const k=(rec.bizNo||"").replace(/\D/g,"");
    const match=k && byBiz[k];
    const out = match ? {...match, ...rec} : rec;
    if(!out._created) out._created=new Date().toISOString();
    if(!match) FIELDS.filter(f=>f.type==="yn"||f.type==="check").forEach(f=>{ if(out[f.key]!=="Y") out[f.key]="N"; });
    try{ await Store.upsert(out); n++; }catch(e){ console.error(e); }
  }
  showToast(`${n}건을 가져왔습니다`);
}

let toastTimer;
function showToast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1900); }
function showMemoTip(text,x,y){
  if(document.querySelector("td input.inline-edit")) return;   // 편집 중에는 표시 안 함
  const tip=document.getElementById("memoTip"); tip.textContent=text;
  const pad=14, w=tip.offsetWidth||280, h=tip.offsetHeight||60;
  let left=x+pad, top=y+18;
  if(left+w>innerWidth-8) left=x-w-pad;
  if(top+h>innerHeight-8) top=y-h-pad;
  tip.style.left=Math.max(8,left)+"px"; tip.style.top=Math.max(8,top)+"px";
  tip.classList.add("show");
}
function hideMemoTip(){ document.getElementById("memoTip").classList.remove("show"); }
document.getElementById("addBtn").addEventListener("click",()=>openDrawer(null));
document.getElementById("csvBtn").addEventListener("click",exportCSV);
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{ const f=e.target.files[0]; if(f) importFile(f); e.target.value=""; });
document.getElementById("closeDrawer").addEventListener("click",closeDrawer);
document.getElementById("cancelBtn").addEventListener("click",closeDrawer);
document.getElementById("saveBtn").addEventListener("click",saveDrawer);
document.getElementById("scrim").addEventListener("click",closeDrawer);
document.getElementById("search").addEventListener("input",e=>{ searchTerm=e.target.value.trim(); render(); });
document.getElementById("clearBtn").addEventListener("click",()=>{ chip=""; searchTerm=""; document.getElementById("search").value=""; render(); });
/* 메모 빠른 편집 모달 (상호명 옆 아이콘에서 열림) */
let memoEditing=null;
function openMemoEditor(rec){
  memoEditing=rec;
  const ta=document.getElementById("memoModalText");
  document.getElementById("memoModalTitle").textContent=(rec.companyName?rec.companyName+" · ":"")+"메모";
  ta.value=rec.memo||"";
  ta.readOnly=!canEdit;
  document.getElementById("memoModalSave").style.display=canEdit?"":"none";
  document.getElementById("memoModalCancel").textContent=canEdit?"취소":"닫기";
  document.getElementById("memoScrim").classList.add("open");
  document.getElementById("memoModal").classList.add("open");
  setTimeout(()=>{ ta.focus(); const n=ta.value.length; ta.setSelectionRange(n,n); },30);
}
function closeMemoEditor(){
  document.getElementById("memoScrim").classList.remove("open");
  document.getElementById("memoModal").classList.remove("open");
  memoEditing=null;
}
async function saveMemoEditor(){
  if(!memoEditing || !canEdit) return;
  const val=document.getElementById("memoModalText").value;
  const rec=ALL.find(x=>x.id===memoEditing.id)||memoEditing;
  if(val!==(rec.memo||"")){ await Store.upsert({...rec,memo:val}); showToast("메모 저장됨"); }
  closeMemoEditor();
}
document.getElementById("memoModalSave").addEventListener("click",saveMemoEditor);
document.getElementById("memoModalCancel").addEventListener("click",closeMemoEditor);
document.getElementById("memoModalClose").addEventListener("click",closeMemoEditor);
document.getElementById("memoScrim").addEventListener("click",closeMemoEditor);
document.getElementById("memoModalText").addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); saveMemoEditor(); }   // Enter=저장, Shift+Enter=줄바꿈
  else if(e.key==="Escape"){ e.preventDefault(); e.stopPropagation(); closeMemoEditor(); }
});

document.addEventListener("keydown",e=>{ if(e.key==="Escape")closeDrawer(); });

/* ============================================================
   8. 시작
   ============================================================ */
function setMode(){
  const badge=document.getElementById("modeBadge"), txt=document.getElementById("modeText");
  if(MODE==="shared"){ badge.className="mode-badge mode-shared"; txt.textContent="팀 공유 · 실시간 동기화"; document.getElementById("setupHint").style.display="none"; }
  else{ badge.className="mode-badge mode-local"; txt.textContent="로컬 저장 · 이 브라우저만"; document.getElementById("setupHint").style.display="block"; }
}

/* ---------- 인증 & 권한 ---------- */
function showAuth(state, msg){
  const sc=document.getElementById("authScreen"); sc.style.display="flex";
  const sub=document.getElementById("authSub"), err=document.getElementById("authError"), gbtn=document.getElementById("googleBtn");
  err.textContent="";
  if(state==="denied"){ sub.textContent="이 계정은 접근 권한이 없습니다. 관리자에게 권한을 요청하세요."; gbtn.style.display="none"; err.textContent=msg||""; }
  else if(state==="loading"){ sub.textContent="확인 중…"; gbtn.style.display="none"; }
  else{ sub.textContent="팀 전용 페이지입니다. 구글 계정으로 로그인하세요."; gbtn.style.display=""; if(msg)err.textContent=msg; }
  ["roleBadge","adminBtn","logoutBtn"].forEach(id=>document.getElementById(id).style.display="none");
  document.getElementById("authLogout").style.display = state==="denied" ? "" : "none";
}
function hideAuth(){ document.getElementById("authScreen").style.display="none"; }

function applyRoleUI(user){
  const isAdmin=ROLE==="admin";
  document.getElementById("addBtn").style.display=canEdit?"":"none";
  document.getElementById("importBtn").style.display=canEdit?"":"none";
  document.getElementById("adminBtn").style.display=isAdmin?"":"none";
  document.getElementById("logoutBtn").style.display="";
  const rb=document.getElementById("roleBadge");
  rb.style.display=""; rb.className="role-badge"+(ROLE==="viewer"?" viewer":"");
  rb.textContent=(isAdmin?"관리자":ROLE==="editor"?"편집 가능":"보기 전용")+(user&&user.email?" · "+user.email:"");
}

let _subscribed=false;
function startData(){ if(_subscribed) return; _subscribed=true; Store.subscribe(rows=>{ ALL=rows; render(); }); }

async function resolveRole(user){
  const email=(user.email||"").toLowerCase();
  if(email===ADMIN_EMAIL) return "admin";
  try{ const d=await db.collection("acl").doc(email).get(); return d.exists ? (d.data().role||"viewer") : null; }
  catch(e){ console.error(e); return null; }
}

function signInGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:"select_account"});
  firebase.auth().signInWithPopup(provider).catch(e=>{
    console.error(e);
    document.getElementById("authError").textContent="로그인 실패: "+(e&&e.code?e.code:"다시 시도하세요");
  });
}

/* ---------- 권한 관리(관리자) ---------- */
function openAdmin(){
  if(ROLE!=="admin") return;
  document.getElementById("adminScrim").classList.add("open");
  const dr=document.getElementById("adminDrawer"); dr.classList.add("open"); dr.setAttribute("aria-hidden","false");
  renderAclList();
}
function closeAdmin(){
  document.getElementById("adminScrim").classList.remove("open");
  const dr=document.getElementById("adminDrawer"); dr.classList.remove("open"); dr.setAttribute("aria-hidden","true");
}
async function renderAclList(){
  const box=document.getElementById("aclList"); box.innerHTML="<p style='color:var(--muted);font-size:12.5px'>불러오는 중…</p>";
  try{
    const snap=await db.collection("acl").get();
    box.innerHTML="";
    const head=document.createElement("div"); head.className="acl-row"; head.innerHTML=`<span class="em" style="color:var(--accent-ink)">${ADMIN_EMAIL}</span><span style="font-size:12px;font-weight:700;color:var(--accent-ink)">관리자(고정)</span>`; box.appendChild(head);
    if(snap.empty){ const p=document.createElement("p"); p.style.cssText="color:var(--muted);font-size:12.5px;margin-top:10px"; p.textContent="아직 등록된 팀원이 없습니다."; box.appendChild(p); return; }
    snap.forEach(doc=>{
      const email=doc.id, role=(doc.data().role||"viewer");
      const row=document.createElement("div"); row.className="acl-row";
      const em=document.createElement("span"); em.className="em"; em.textContent=email;
      const sel=document.createElement("select");
      [["editor","편집"],["viewer","보기"]].forEach(([v,t])=>{ const o=document.createElement("option"); o.value=v; o.textContent=t; if(v===role)o.selected=true; sel.appendChild(o); });
      sel.addEventListener("change",async()=>{ await db.collection("acl").doc(email).set({role:sel.value}); showToast("권한 변경됨"); });
      const rm=document.createElement("button"); rm.className="rm"; rm.innerHTML="🗑"; rm.title="삭제";
      rm.addEventListener("click",async()=>{ if(confirm(`${email} 권한을 삭제할까요?`)){ await db.collection("acl").doc(email).delete(); renderAclList(); showToast("삭제됨"); } });
      row.appendChild(em); row.appendChild(sel); row.appendChild(rm); box.appendChild(row);
    });
  }catch(e){ console.error(e); box.innerHTML="<p style='color:var(--danger);font-size:12.5px'>목록을 불러오지 못했습니다. 보안 규칙을 확인하세요.</p>"; }
}
async function addAcl(){
  const email=document.getElementById("aclEmail").value.trim().toLowerCase();
  const role=document.getElementById("aclRole").value;
  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ alert("올바른 이메일을 입력하세요."); return; }
  if(email===ADMIN_EMAIL){ alert("관리자 계정은 이미 고정 권한입니다."); return; }
  try{ await db.collection("acl").doc(email).set({role}); document.getElementById("aclEmail").value=""; renderAclList(); showToast("저장됨"); }
  catch(e){ console.error(e); alert("저장 실패: 관리자 계정으로 로그인했는지, 보안 규칙이 적용됐는지 확인하세요."); }
}

document.getElementById("googleBtn").addEventListener("click",signInGoogle);
document.getElementById("authLogout").addEventListener("click",()=>{ if(MODE==="shared") firebase.auth().signOut(); });
document.getElementById("logoutBtn").addEventListener("click",()=>{ if(MODE==="shared") firebase.auth().signOut(); });
document.getElementById("adminBtn").addEventListener("click",openAdmin);
document.getElementById("adminClose").addEventListener("click",closeAdmin);
document.getElementById("adminScrim").addEventListener("click",closeAdmin);
document.getElementById("aclAdd").addEventListener("click",addAcl);

/* ---------- 시작 ---------- */
Store.init(); setMode();
if(MODE==="shared"){
  showAuth("loading");
  firebase.auth().onAuthStateChanged(async user=>{
    if(!user){ ROLE=null; canEdit=false; canDelete=false; showAuth("login"); return; }
    showAuth("loading");
    ROLE=await resolveRole(user);
    if(!ROLE){ canEdit=false; canDelete=false; showAuth("denied"); return; }
    canEdit=(ROLE==="admin"||ROLE==="editor");
    canDelete=(ROLE==="admin");
    hideAuth(); applyRoleUI(user); startData();
  });
}else{
  ROLE="local"; canEdit=true; canDelete=true; hideAuth(); startData();   // 로컬 모드: 로그인 없이 편집 가능
}
</script>
